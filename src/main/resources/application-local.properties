# Local profile (H2 in-memory) to run the API without Oracle.
spring.datasource.url=jdbc:h2:mem:novedadeslz;MODE=Oracle;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.defer-datasource-initialization=true

spring.sql.init.mode=never
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

logging.level.com.novedadeslz=DEBUG

local.admin.email=${LOCAL_ADMIN_EMAIL:admin@novedadeslz.com}
local.admin.password=${LOCAL_ADMIN_PASSWORD:Admin12345!}
local.admin.full-name=${LOCAL_ADMIN_FULL_NAME:Administrador Local}
local.admin.phone=${LOCAL_ADMIN_PHONE:+51987654321}

app.upload.local-dir=${APP_UPLOAD_LOCAL_DIR:./uploads}
app.public-base-url=${APP_PUBLIC_BASE_URL:http://localhost:8080}
app.admin-orders-url=${APP_ADMIN_ORDERS_URL:http://localhost:3000/admin/orders}
whatsapp.admin.phone=${WHATSAPP_ADMIN_PHONE:+51939662630}
whatsapp.provider=${WHATSAPP_PROVIDER:auto}
