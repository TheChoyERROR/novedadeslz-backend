# Application
spring.application.name=novedadeslz-backend
server.port=${PORT:8080}
server.address=0.0.0.0

# Oracle Database
spring.datasource.url=${DB_URL:jdbc:oracle:thin:@//localhost:1521/XE}
spring.datasource.username=${DB_USERNAME:novedadeslz}
spring.datasource.password=${DB_PASSWORD:novedadeslz123}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect

# JWT
jwt.secret=${JWT_SECRET:TuClaveSecretaSuperSeguraDeAlMenos64CaracteresParaHS512Algorithm}
jwt.expiration=86400000

# OCR.space API
ocr.space.api-key=${OCR_SPACE_API_KEY:}
yape.recipient.phone=${YAPE_RECIPIENT_PHONE:939662630}
yape.recipient.name=${YAPE_RECIPIENT_NAME:Leslie Lopez}

# Cloudinary (para gestión de imágenes de productos)
# Obtén estas credenciales desde: https://console.cloudinary.com/
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# WhatsApp Cloud API (notificaciones al admin)
whatsapp.notifications.enabled=${WHATSAPP_NOTIFICATIONS_ENABLED:true}
whatsapp.admin.phone=${WHATSAPP_ADMIN_PHONE:}
whatsapp.provider=${WHATSAPP_PROVIDER:auto}
whatsapp.cloud-api.access-token=${WHATSAPP_CLOUD_API_ACCESS_TOKEN:}
whatsapp.cloud-api.phone-number-id=${WHATSAPP_CLOUD_API_PHONE_NUMBER_ID:}
whatsapp.cloud-api.version=${WHATSAPP_CLOUD_API_VERSION:v22.0}
whatsapp.twilio.account-sid=${TWILIO_ACCOUNT_SID:}
whatsapp.twilio.auth-token=${TWILIO_AUTH_TOKEN:}
whatsapp.twilio.api-key-sid=${TWILIO_API_KEY_SID:}
whatsapp.twilio.api-key-secret=${TWILIO_API_KEY_SECRET:}
whatsapp.twilio.from=${TWILIO_WHATSAPP_FROM:whatsapp:+14155238886}
app.admin-orders-url=${APP_ADMIN_ORDERS_URL:http://localhost:3000/admin/orders}
app.bootstrap-admin.enabled=${APP_BOOTSTRAP_ADMIN_ENABLED:false}
app.bootstrap-admin.email=${APP_BOOTSTRAP_ADMIN_EMAIL:}
app.bootstrap-admin.password=${APP_BOOTSTRAP_ADMIN_PASSWORD:}
app.bootstrap-admin.full-name=${APP_BOOTSTRAP_ADMIN_FULL_NAME:Administrador}
app.bootstrap-admin.phone=${APP_BOOTSTRAP_ADMIN_PHONE:}
app.bootstrap-admin.reset-password=${APP_BOOTSTRAP_ADMIN_RESET_PASSWORD:false}

# File Upload (tamaño máximo de archivos - ajustado para imágenes)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
spring.servlet.multipart.enabled=true

# CORS
cors.allowed-origins=http://localhost:5173,http://localhost:3000

# Logging
logging.level.com.novedadeslz=DEBUG
